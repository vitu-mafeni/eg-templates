singleuser:
  defaultUrl: "/lab"
  profileList: []
  extraEnv:
    JUPYTER_GATEWAY_URL: "http://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_WS_URL: "ws://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_REQUEST_TIMEOUT: "300"
    JUPYTER_GATEWAY_CONNECT_TIMEOUT: "120"
    JUPYTER_GATEWAY_WS_PING_INTERVAL: "30"
    KERNEL_SERVICE_ACCOUNT_NAME: "enterprise-gateway-sa"
  cmd: ["jupyterhub-singleuser"]
  image:
    name: vitu1/jupyterhub-singleuser
    tag: "eg-compat-oidc"
  storage:
    type: dynamic

ingress:
  enabled: false