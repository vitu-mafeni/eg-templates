singleuser:
  defaultUrl: "/lab"
  profileList: []
  extraEnv:
    JUPYTER_GATEWAY_URL: "http://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_WS_URL: "ws://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_REQUEST_TIMEOUT: "300"
    JUPYTER_GATEWAY_CONNECT_TIMEOUT: "120"
    JUPYTER_GATEWAY_WS_PING_INTERVAL: "30"
    KERNEL_SERVICE_ACCOUNT_NAME: "enterprise-gateway-sa"
  cmd: ["jupyterhub-singleuser"]
  image:
    name: vitu1/jupyterhub-singleuser
    tag: "eg-compat-oidc"
  storage:
    type: dynamic

  # ── JupyterLab launcher clean-up ────────────────────────────────────────────
  # All Traitlets-based approaches (blocked_extensions_uids, blocked_extensions_uris)
  # either don't exist or expect a single URI string rather than a list, causing
  # the server to crash on startup with exit code 1.
  #
  # Correct approach: run imperative Python in jupyter_lab_config.py to write
  # page_config.json directly to the conda app directory.  This works because:
  #   - /etc/jupyter/jupyter_lab_config.py is executed by Jupyter before the
  #     server builds its first page config response.
  #   - Writes to /opt/conda/share/jupyter/lab/ via normal Python file I/O go
  #     through overlayfs copy-on-write correctly.  Only bind mounts (ConfigMap
  #     subPath) fail there; direct writes from inside the container do not.
  #   - No Traitlets assignments → no type errors → no crash.
  extraFiles:
    lab-disable-extensions:
      mountPath: /etc/jupyter/jupyter_lab_config.py
      stringData: |
        # Write page_config.json into the JupyterLab app directory so the server
        # serves disabledExtensions to the browser before any JS is loaded.
        # This runs at Jupyter startup, well before the first HTTP response.
        import json as _json, pathlib as _path, logging as _log

        _logger = _log.getLogger("jupyter_lab_config")
        _lab_dir = _path.Path("/opt/conda/share/jupyter/lab")

        if _lab_dir.exists():
            try:
                _pc = _lab_dir / "page_config.json"
                # Preserve any existing keys (e.g. exposeAppInBrowser) set by
                # the JupyterLab package itself.
                _cfg = {}
                if _pc.exists():
                    try:
                        _cfg = _json.loads(_pc.read_text())
                    except Exception:
                        pass
                _cfg["disabledExtensions"] = [
                    # ── Elyra ───────────────────────────────────────────────
                    "@elyra/pipeline-editor-extension",
                    "@elyra/python-editor-extension",
                    "@elyra/scala-editor-extension",
                    "@elyra/r-editor-extension",
                    "@elyra/theme-extension",
                    # ── JupyterLab built-ins (launcher tile only) ────────────
                    # plugin ID format keeps the sidebar / menu entry intact.
                    "@jupyterlab/terminal-extension:plugin",
                    "@jupyterlab/filebrowser-extension:launcher",
                    "@jupyterlab/contextual-help-extension:plugin",
                ]
                _pc.write_text(_json.dumps(_cfg, indent=2))
                _logger.info(
                    "page_config.json written to %s (%d disabled)",
                    _pc, len(_cfg["disabledExtensions"])
                )
            except Exception as _e:
                _logger.warning("Failed to write page_config.json: %s", _e)
        else:
            _logger.warning("JupyterLab app dir not found at %s", _lab_dir)

ingress:
  enabled: false