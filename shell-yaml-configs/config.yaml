hub:
  config:
    JupyterHub:
      authenticator_class: oauthenticator.generic.GenericOAuthenticator

    GenericOAuthenticator:
      # ── Keycloak OIDC endpoints ──────────────────────────────
      # Replace 192.168.3.234 with your node IP or Keycloak ingress hostname
      client_id: "jupyterhub-client"
      client_secret: "jupyterhub-secret-changeme"
      oauth_callback_url: "http://192.168.3.234:30080/hub/oauth_callback"
      authorize_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/auth"
      token_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/token"
      userdata_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/userinfo"
      logout_redirect_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/logout"

      # ── Token claims ─────────────────────────────────────────
      username_claim: "preferred_username"
      userdata_params:
        state: state
      scope:
        - openid
        - profile
        - email
        # - groups

      # ── Group sync ───────────────────────────────────────────
      # Groups from Keycloak token are synced to JupyterHub groups
      # which drive the profile_list filtering below
      claim_groups_key: "groups"
      manage_groups: true

      # ── Access control ───────────────────────────────────────
      # Only users in at least one of these groups can log in
      allowed_groups:
        - cpu-users
        - gpu-users
        - gpu-power-users
        - researchers

      # Admin users — can be Keycloak group or explicit list
      admin_users:
        - adminuser1
        - adminuser2

