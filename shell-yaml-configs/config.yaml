singleuser:
  defaultUrl: "/lab"
  profileList: []
  extraEnv:
    JUPYTER_GATEWAY_URL: "http://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_WS_URL: "ws://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_REQUEST_TIMEOUT: "300"
    JUPYTER_GATEWAY_CONNECT_TIMEOUT: "120"
    JUPYTER_GATEWAY_WS_PING_INTERVAL: "30"
    KERNEL_SERVICE_ACCOUNT_NAME: "enterprise-gateway-sa"
  cmd: ["jupyterhub-singleuser"]
  image:
    name: vitu1/jupyterhub-singleuser
    tag: "eg-compat-oidc"
  storage:
    type: dynamic

  # ── JupyterLab launcher clean-up ────────────────────────────────────────────
  # Previous approach used page_config.json mounted into the conda application
  # directory (/opt/conda/share/jupyter/lab/).  That directory is an image
  # layer managed by overlayfs; mounting a ConfigMap file into it via subPath
  # silently fails in containerd because the bind mount is shadowed by the
  # overlayfs upper layer before JupyterLab reads the file.
  #
  # Reliable approach: mount a jupyter_lab_config.py file into /etc/jupyter/.
  # Jupyter's config loader always scans /etc/jupyter/ (it is NOT an image
  # layer — it is an empty directory created at pod start).  We already prove
  # this works because jupyter_server_config.py is mounted there successfully.
  #
  # LabServerApp.blocked_extensions_uids is the server-side equivalent of
  # page_config.json disabledExtensions.  The server builds the page config
  # from this list before the HTML response is sent, so the browser never
  # downloads or activates the blocked extension JS modules.
  #
  # Two groups:
  #   Elyra section (five packages removed entirely):
  #     @elyra/pipeline-editor-extension → Generic + both Pipeline Editors
  #     @elyra/python-editor-extension   → Python Editor
  #     @elyra/scala-editor-extension    → Scala Editor
  #     @elyra/r-editor-extension        → R Editor
  #     @elyra/theme-extension           → Documentation + What's new in v3.15.0
  #
  #   Other section (only the plugin that adds launcher tiles is blocked;
  #                  the underlying functionality remains in menus):
  #     @jupyterlab/terminal-extension:plugin         → Terminal tile
  #     @jupyterlab/filebrowser-extension:launcher    → Text File + Markdown File tiles
  #     @jupyterlab/contextual-help-extension:plugin  → Show Contextual Help tile
  extraFiles:
    lab-disable-extensions:
      mountPath: /etc/jupyter/jupyter_lab_config.py
      stringData: |
        # Blocks the listed extensions/plugins before JupyterLab builds the
        # page config response.  The browser never sees or activates them.
        c.LabServerApp.blocked_extensions_uids = [
            # ── Elyra ─────────────────────────────────────────────────────
            "@elyra/pipeline-editor-extension",
            "@elyra/python-editor-extension",
            "@elyra/scala-editor-extension",
            "@elyra/r-editor-extension",
            "@elyra/theme-extension",
            # ── JupyterLab built-ins (tile-only removal) ──────────────────
            # Use the plugin ID format (package:pluginId) to block only the
            # plugin that registers the launcher tile, not the whole extension.
            "@jupyterlab/terminal-extension:plugin",
            "@jupyterlab/filebrowser-extension:launcher",
            "@jupyterlab/contextual-help-extension:plugin",
        ]

ingress:
  enabled: false