singleuser:
  defaultUrl: "/lab"
  profileList: []
  extraEnv:
    JUPYTER_GATEWAY_URL: "http://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_WS_URL: "ws://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
    JUPYTER_GATEWAY_REQUEST_TIMEOUT: "300"
    JUPYTER_GATEWAY_CONNECT_TIMEOUT: "120"
    JUPYTER_GATEWAY_WS_PING_INTERVAL: "30"
    KERNEL_SERVICE_ACCOUNT_NAME: "enterprise-gateway-sa"
  cmd: ["jupyterhub-singleuser"]
  image:
    name: vitu1/jupyterhub-singleuser
    tag: "eg-compat-oidc"
  storage:
    type: dynamic

  # ── JupyterLab launcher clean-up ────────────────────────────────────────────
  # All Traitlets-based approaches (blocked_extensions_uids, blocked_extensions_uris)
  # either don't exist or expect a single URI string rather than a list, causing
  # the server to crash on startup with exit code 1.
  #
  # Correct approach: run imperative Python in jupyter_lab_config.py to write
  # page_config.json directly to the conda app directory.  This works because:
  #   - /etc/jupyter/jupyter_lab_config.py is executed by Jupyter before the
  #     server builds its first page config response.
  #   - Writes to /opt/conda/share/jupyter/lab/ via normal Python file I/O go
  #     through overlayfs copy-on-write correctly.  Only bind mounts (ConfigMap
  #     subPath) fail there; direct writes from inside the container do not.
  #   - No Traitlets assignments → no type errors → no crash.
  extraFiles:
    lab-disable-extensions:
      mountPath: /opt/conda/etc/jupyter/jupyter_server_config.py
      stringData: |
        # jupyter_config.py — loaded by every Jupyter application at startup.
        #
        # Root causes of previous failures:
        #   1. _DISABLED was a Python list → JS sees a JSON array and does
        #      `disabledExtensions["@elyra/..."]` which is always undefined on
        #      arrays.  JupyterLab 3 requires a dict: {"pluginId": true}.
        #   2. We wrote only to /opt/conda/.../lab/page_config.json (system).
        #      ElyraApp overwrites that file ~1 s later.  The fix is to ALSO
        #      write to ~/.jupyter/labconfig/page_config.json (user-level) —
        #      the same location `jupyter labextension disable` uses.  Elyra
        #      never writes there, so our entry survives permanently.
        #
        # Three-layer defence (all layers use dict format now):
        #   A) Write to BOTH system-level and user-level labconfig. The labconfig
        #      write is permanent and immune to Elyra's overwrite.
        #   B) Patch LabServerApp.initialize_settings so settings["page_config_data"]
        #      always carries disabledExtensions after all extensions load.
        #   C) Patch LabHandler.page_config_data property (request-time) so the
        #      browser always receives the correct value regardless of what
        #      happened in memory after B.
        import json as _json, pathlib as _path

        # ── dict format: JupyterLab 3 JS reads disabledExtensions[id] ────────
        _DISABLED = {
            "@elyra/pipeline-editor-extension": True,
            "@elyra/python-editor-extension": True,
            "@elyra/scala-editor-extension": True,
            "@elyra/r-editor-extension": True,
            "@elyra/theme-extension": True,
            "@jupyterlab/terminal-extension:plugin": True,
            "@jupyterlab/filebrowser-extension:launcher": True,
            "@jupyterlab/contextual-help-extension:plugin": True,
        }

        def _inject(cfg):
            if isinstance(cfg, dict):
                cfg["disabledExtensions"] = _DISABLED
            return cfg

        def _write_page_config(path):
            """Read-merge-write page_config.json at the given path."""
            try:
                path.parent.mkdir(parents=True, exist_ok=True)
                _d = {}
                if path.exists():
                    try: _d = _json.loads(path.read_text())
                    except Exception: pass
                _inject(_d)
                path.write_text(_json.dumps(_d, indent=2))
                print(f"[jup-cfg] A: written {path} ({len(_DISABLED)} disabled)")
            except Exception as _e:
                print(f"[jup-cfg] A: ERROR writing {path}: {_e}")

        # ── A: system-level (best-effort; Elyra may overwrite) ───────────────
        _lab_dir = _path.Path("/opt/conda/share/jupyter/lab")
        if _lab_dir.exists():
            _write_page_config(_lab_dir / "page_config.json")
        else:
            print(f"[jup-cfg] A: WARNING lab dir not found at {_lab_dir}")

        # ── A: user-level labconfig (permanent; Elyra never writes here) ─────
        _write_page_config(_path.Path.home() / ".jupyter/labconfig/page_config.json")

        # ── B: patch LabServerApp.initialize_settings ────────────────────────
        try:
            from jupyter_lab_server.app import LabServerApp as _LSA
            _orig_is = _LSA.initialize_settings
            def _patched_is(self):
                _orig_is(self)
                _inject(self.settings.setdefault("page_config_data", {}))
                print("[jup-cfg] B: page_config_data['disabledExtensions'] injected")
            _LSA.initialize_settings = _patched_is
            print("[jup-cfg] B: LabServerApp.initialize_settings patched")
        except Exception as _e:
            print(f"[jup-cfg] B: {_e}")

        # ── C: patch LabHandler.page_config_data (request-time, belt+braces) ─
        try:
            from jupyter_lab_server.handlers import LabHandler as _LH
            _pp = _LH.__dict__.get("page_config_data")
            if isinstance(_pp, property):
                _orig_get = _pp.fget
                _LH.page_config_data = property(lambda self: _inject(_orig_get(self)))
                print("[jup-cfg] C: LabHandler.page_config_data property patched")
            else:
                print(f"[jup-cfg] C: page_config_data not a property — skipped (type={type(_pp).__name__})")
        except Exception as _e:
            print(f"[jup-cfg] C: {_e}")

ingress:
  enabled: false